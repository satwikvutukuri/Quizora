<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Quiz</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="module" src="./student.js" defer></script>
</head>
<body>
  <div class="container card">

    <!-- Student Guidelines (unchanged) -->
    <div class="student-guidelines card" id="guidelines">
      <!-- ... as before ... -->
    </div>

    <h1>Student Quiz Portal</h1>
    <!-- Login -->
    <button id="login-btn" class="btn-accent">Login with Google</button>
    <p id="studentInfo"></p>

    <!-- Registration number -->
    <div id="reg-section" style="display:none;">
      <label for="reg-num">Enter Registration Number:</label>
      <input type="text" id="reg-num" autocomplete="off" maxlength="12" minlength="6" pattern="[a-zA-Z0-9]{6,12}">
      <button id="lock-reg-btn" class="btn-accent">Start Quiz</button>
      <button id="view-results-btn" class="btn-accent" style="display:none;">View Results</button>
      <div id="reg-error-msg" style="color:#ff6b6b; margin-top:8px; min-height:20px;"></div>
    </div>

    <!-- Modern Quiz area (use new classes and structure for modern look) -->
    <div id="quiz-section" style="display:none;">
      <div class="quiz-card">
        <h2 id="quizTitle"></h2>
        <div class="quiz-timer" id="global-timer"></div>
        <div class="question-timer" id="question-timer"></div>
        <div id="quiz-warning"></div>
        <div id="fullscreen-msg"></div>
        <div class="question-box" id="question-box"></div>
        <div class="reveal-slider-wrap">
          <input type="range" id="reveal-slider" class="reveal-slider" min="0" max="100" value="0">
        </div>
        <div class="options-list" id="options-box"></div>
        <button class="next-btn" id="next-btn" style="display:none;">Next</button>
        <button class="next-btn" id="submit-btn" style="display:none;">Submit</button>
        <div id="result-section" style="display:none;"><p id="result-text"></p></div>
      </div>
    </div>
    <!-- End Modern Quiz Area -->

  </div>
</body>
</html>
